        /* Include the necessary UI styles dynamically generated by the user's previous code */
        :root{--primary-hover:#4338ca;--secondary:#10B981;--bg-color:#F3F4F6;--card-bg:#FFFFFF;--text-main:#1F2937;--text-muted:#6B7280;--border-color:#E5E7EB}
        .container{width:100%;max-width:1000px;background:var(--card-bg);border-radius:16px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.1),0 8px 10px -6px rgba(0,0,0,0.1);padding:40px;display:flex;flex-direction:column;gap:30px}

        p.subtitle{color:var(--text-muted);margin:0}
        .steps-container{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
        .step-card{background:#F9FAFB;border:2px dashed #D1D5DB;border-radius:12px;padding:24px;text-align:center;transition:all .2s ease;position:relative}
        .step-card:hover{border-color:var(--primary);background:#F0F9FF}
        .step-card.active{border-color:var(--secondary);background:#ECFDF5}
        .step-title{font-weight:600;color:var(--text-main);margin-bottom:12px;font-size:16px}
        input[type="file"]{display:none}
        .custom-file-upload{display:inline-block;padding:10px 20px;cursor:pointer;background:white;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;font-weight:500;color:#374151;transition:all .2s}
        .custom-file-upload:hover{background:#F3F4F6}
        .file-name{margin-top:10px;font-size:13px;color:var(--primary);font-weight:500;word-break:break-all}
        .preview-section{background:#fff;border:1px solid var(--border-color);border-radius:12px;padding:20px;height:350px;display:flex;flex-direction:column}
        .preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .search-box{padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;width:250px;font-size:14px}
        .table-wrapper{flex:1;overflow-y:auto;border:1px solid var(--border-color);border-radius:8px}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{background:#F8F9FB;color:#4B5563;font-weight:600;padding:10px 14px;text-align:left;position:sticky;top:0;z-index:10}
        td{padding:10px 14px;border-bottom:1px solid #E5E7EB}
        tr:last-child td{border-bottom:none}
        .action-area{text-align:center;margin-top:10px}
        .btn-primary{background-color:var(--primary);color:white;border:none;padding:14px 28px;font-size:16px;font-weight:600;border-radius:8px;cursor:pointer;transition:background .2s;width:100%;display:flex;justify-content:center;align-items:center;gap:10px}
        .btn-primary:hover:not(:disabled){background-color:var(--primary-hover)}
        .btn-primary:disabled{background-color:#9CA3AF;cursor:not-allowed;opacity:.7}
        .status-msg{margin-top:15px;font-size:14px;color:var(--text-muted);min-height:20px}
        .warning-banner{background-color:#FEF2F2;border:1px solid #FCA5A5;color:#991B1B;padding:12px;border-radius:8px;text-align:center;font-weight:600;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px}
        @media (max-width:700px){.steps-container{grid-template-columns:1fr}}
